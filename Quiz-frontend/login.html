<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — QuizMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="particles" id="particles"></div>

<nav class="navbar">
  <a href="index.html" class="logo">🎯 <span>QuizMaster</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="register.html">Register</a>
  </div>
</nav>

<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">🎯</div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Login to continue your learning journey</p>

    <div class="alert alert-danger" id="alert">❌ Error message</div>
    <div class="alert alert-success" id="alert-ok">✅ Success!</div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="icon">📧</span>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Login →</button>

    <div class="divider">or</div>
    <div class="switch-link">Don't have an account? <a href="register.html">Register here</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(getToken()) window.location.href='index.html';

// Particles
const pc=document.getElementById('particles');
for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';const s=Math.random()*4+2;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*8}s;background:${['#a78bfa','#f472b6'][Math.floor(Math.random()*2)]};`;pc.appendChild(p);}

document.getElementById('password').addEventListener('keypress',e=>{ if(e.key==='Enter') handleLogin(); });

async function handleLogin(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value.trim();
  const btn=document.getElementById('login-btn');

  if(!email||!password){ showAlert('Please fill in all fields!','danger'); return; }

  btn.textContent='⏳ Logging in...'; btn.disabled=true;

  try{
    const data=await loginUser(email,password);
    saveToken(data.token);
    saveUser({ id:data.id, name:data.name, email:data.email, role:data.role });
    showAlert('Login successful! Redirecting...','success');
    setTimeout(()=>window.location.href='index.html',1000);
  }catch(e){
    showAlert('Invalid email or password!','danger');
    btn.textContent='Login →'; btn.disabled=false;
  }
}

function showAlert(msg,type){
  document.querySelectorAll('.alert').forEach(a=>a.classList.remove('show'));
  const el=document.getElementById(type==='danger'?'alert':'alert-ok');
  el.textContent=(type==='danger'?'❌ ':'✅ ')+msg;
  el.classList.add('show');
  if(type==='danger') setTimeout(()=>el.classList.remove('show'),4000);
}
</script>
</body>
</html>
