<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — QuizMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="particles" id="particles"></div>

<nav class="navbar">
  <a href="index.html" class="logo">🎯 <span>QuizMaster</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<div class="auth-bg">
  <div class="auth-card" id="reg-form">
    <div class="auth-logo">🎓</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join QuizMaster and start earning certificates!</p>

    <div class="alert alert-danger" id="alert"></div>

    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" id="name" placeholder="Your full name" />
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="icon">📧</span>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Min 6 characters" oninput="checkStrength(this.value)" />
      </div>
      <div id="strength" class="strength"></div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="confirm" placeholder="Re-enter password" />
      </div>
    </div>

    <div class="form-group">
      <label>Register As</label>
      <div class="input-wrap">
        <span class="icon">🎭</span>
        <select id="role">
          <option value="USER">Student (Take Quizzes)</option>
          <option value="ADMIN">Admin (Create Quizzes)</option>
        </select>
      </div>
    </div>

    <div class="terms-row">
      <input type="checkbox" id="terms" />
      <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
    </div>

    <button class="btn btn-primary" id="reg-btn" onclick="handleRegister()">Create Account →</button>
    <div class="divider">or</div>
    <div class="switch-link">Already have an account? <a href="login.html">Login here</a></div>
  </div>

  <!-- Success -->
  <div class="auth-card" id="success-card" style="display:none;text-align:center;">
    <div style="font-size:72px;margin-bottom:16px;animation:bounceIn 0.6s ease both">🎉</div>
    <h2 style="font-size:26px;margin-bottom:12px;">Account Created!</h2>
    <p style="color:var(--text-muted);margin-bottom:28px;line-height:1.7;">Your account has been successfully created. You can now login and start taking quizzes!</p>
    <a href="login.html" class="btn btn-primary">Go to Login →</a>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(getToken()) window.location.href='index.html';

const pc=document.getElementById('particles');
for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';const s=Math.random()*4+2;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*8}s;background:${['#a78bfa','#f472b6'][Math.floor(Math.random()*2)]};`;pc.appendChild(p);}

function checkStrength(pw){
  const el=document.getElementById('strength');
  if(!pw){el.textContent='';return;}
  if(pw.length<4){el.textContent='⚠️ Weak';el.className='strength weak';}
  else if(pw.length<8){el.textContent='⚡ Medium';el.className='strength medium';}
  else{el.textContent='✅ Strong';el.className='strength strong';}
}

async function handleRegister(){
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value.trim();
  const confirm=document.getElementById('confirm').value.trim();
  const role=document.getElementById('role').value;
  const terms=document.getElementById('terms').checked;
  const btn=document.getElementById('reg-btn');

  if(!name||!email||!password||!confirm){showAlert('Please fill in all fields!');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showAlert('Enter a valid email!');return;}
  if(password.length<6){showAlert('Password must be at least 6 characters!');return;}
  if(password!==confirm){showAlert('Passwords do not match!');return;}
  if(!terms){showAlert('Please accept the Terms & Conditions!');return;}

  btn.textContent='⏳ Creating...'; btn.disabled=true;

  try{
    const res=await registerUser(name,email,password,role);
    if(res&&(res.toLowerCase().includes('already')||res.toLowerCase().includes('exist'))){
      showAlert('This email is already registered!');btn.textContent='Create Account →';btn.disabled=false;return;
    }
    document.getElementById('reg-form').style.display='none';
    document.getElementById('success-card').style.display='block';
  }catch(e){
    const msg = e.message||'';
    if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('fetch')){
      showAlert('Cannot connect to server! Make sure Spring Boot is running on port 8081.');
    } else if(msg.toLowerCase().includes('already')||msg.toLowerCase().includes('exist')){
      showAlert('This email is already registered!');
    } else {
      showAlert(msg || 'Registration failed. Check your backend server!');
    }
    btn.textContent='Create Account →'; btn.disabled=false;
  }
}

function showAlert(msg){
  const el=document.getElementById('alert');
  el.textContent='❌ '+msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),4000);
}
</script>
</body>
</html>
