<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result — QuizMaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .result-page {
      min-height: 100vh;
      padding: 100px 20px 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .result-wrap { width: 100%; max-width: 600px; }

    /* Card */
    .result-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-deep);
      animation: scaleIn 0.5s var(--ease-spring) both;
    }

    /* Top Banner */
    .r-banner {
      padding: 44px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .r-banner.passed {
      background: linear-gradient(135deg, rgba(5,150,105,0.35), rgba(16,185,129,0.2));
      border-bottom: 1px solid rgba(16,185,129,0.25);
    }

    .r-banner.failed {
      background: linear-gradient(135deg, rgba(153,27,27,0.35), rgba(239,68,68,0.2));
      border-bottom: 1px solid rgba(239,68,68,0.25);
    }

    .r-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.08), transparent 70%);
    }

    .r-banner > * { position: relative; z-index: 1; }

    .r-icon {
      font-size: 72px;
      display: block;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 24px rgba(255,255,255,0.3));
      animation: scaleIn 0.6s 0.3s var(--ease-spring) both;
    }

    .r-banner h2 {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: var(--text-white);
      margin-bottom: 8px;
    }

    .r-banner p { color: rgba(255,255,255,0.75); font-size: 16px; }

    /* Score Ring */
    .score-section {
      padding: 40px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .score-ring {
      width: 158px;
      height: 158px;
      border-radius: 50%;
      border: 7px solid rgba(99,102,241,0.35);
      background: rgba(99,102,241,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      position: relative;
      animation: scaleIn 0.6s 0.4s var(--ease-spring) both;
      box-shadow: 0 0 40px rgba(99,102,241,0.25), inset 0 0 20px rgba(99,102,241,0.1);
    }

    .score-ring::after {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(99,102,241,0.2);
    }

    .score-num {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .score-lbl {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .r-quiz-title {
      font-family: 'Syne', sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: var(--text-white);
      margin-bottom: 6px;
      animation: fadeUp 0.5s 0.5s var(--ease) both;
    }

    .r-quiz-sub {
      color: var(--text-muted);
      font-size: 14px;
      animation: fadeUp 0.5s 0.6s var(--ease) both;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .stat-cell {
      padding: 26px 20px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.06);
      animation: fadeUp 0.5s 0.7s var(--ease) both;
    }

    .stat-cell:last-child { border-right: none; }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .stat-lbl {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Actions */
    .r-actions {
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      animation: fadeUp 0.5s 0.8s var(--ease) both;
    }

    .btn-download {
      background: var(--grad-primary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: var(--radius-md);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.25s var(--ease);
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }

    .btn-download:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(99,102,241,0.55); }
    .btn-download:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    .btn-retry {
      background: rgba(255,255,255,0.06);
      color: var(--text-soft);
      border: 1px solid var(--glass-border);
      padding: 14px;
      border-radius: var(--radius-md);
      font-family: 'Outfit', sans-serif;
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      text-align: center;
    }

    .btn-retry:hover { background:rgba(255,255,255,0.1); color:white; }

    .btn-home-r {
      background: transparent;
      color: var(--text-muted);
      border: none;
      padding: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: color 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .btn-home-r:hover { color: var(--text-white); }

    /* Failed note */
    .fail-note {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: var(--radius-sm);
      padding: 13px 20px;
      margin: 0 36px 4px;
      font-size: 13.5px;
      color: #fcd34d;
      text-align: center;
    }

    /* Confetti */
    .confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-80px) rotate(0deg);    opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg);  opacity: 0; }
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<div class="confetti-canvas" id="confetti"></div>

<nav class="navbar">
  <a href="index.html" class="logo">🎯 QuizMaster</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="result-page">
  <div class="result-wrap">

    <!-- Loading -->
    <div id="loading-res" class="loading-screen">
      <div class="spinner"></div>
      <h3 style="font-family:'Syne',sans-serif; margin-bottom:8px;">Calculating Result...</h3>
      <p style="color:var(--text-muted);">Please wait a moment</p>
    </div>

    <!-- Result Card -->
    <div class="result-card" id="result-card" style="display:none;">

      <div class="r-banner" id="r-banner">
        <span class="r-icon" id="r-icon">🎉</span>
        <h2 id="r-title">Congratulations!</h2>
        <p id="r-sub">You passed the quiz!</p>
      </div>

      <div class="score-section">
        <div class="score-ring">
          <div class="score-num" id="score-num">0%</div>
          <div class="score-lbl">SCORE</div>
        </div>
        <div class="r-quiz-title" id="r-quiz-title">Quiz Title</div>
        <div class="r-quiz-sub"   id="r-quiz-sub">Details</div>
      </div>

      <div class="stats-row">
        <div class="stat-cell">
          <div class="stat-val" id="s-score">0%</div>
          <div class="stat-lbl">Your Score</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="s-passing">60%</div>
          <div class="stat-lbl">Passing Score</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="s-status">–</div>
          <div class="stat-lbl">Status</div>
        </div>
      </div>

      <div class="fail-note" id="fail-note" style="display:none;">
        💡 You need <strong id="score-needed">0%</strong> more to pass. Keep practicing!
      </div>

      <div class="r-actions">
        <button class="btn-download" id="cert-btn" onclick="handleDownload()" style="display:none;">
          🏆 Download Certificate
        </button>
        <button class="btn-retry" onclick="retryQuiz()">🔄 Try Again</button>
        <a href="index.html"    class="btn-home-r">🏠 Back to Home</a>
        <a href="dashboard.html" class="btn-home-r">📊 View Dashboard</a>
      </div>

    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  if (!getToken()) window.location.href = "login.html";

  let resultData = null;

  window.onload = () => {
    const raw = sessionStorage.getItem("quizResult");
    if (!raw) { window.location.href = "index.html"; return; }
    resultData = JSON.parse(raw);
    setTimeout(() => showResult(resultData), 1400);
  };

  function showResult(data) {
    document.getElementById("loading-res").style.display  = "none";
    document.getElementById("result-card").style.display  = "block";

    const passed      = data.passed;
    const score       = data.score;
    const passingScore = data.passingScore || 60;

    // Banner
    const banner = document.getElementById("r-banner");
    banner.classList.add(passed ? "passed" : "failed");
    document.getElementById("r-icon").textContent  = passed ? "🎉" : "😔";
    document.getElementById("r-title").textContent = passed ? "Congratulations!" : "Better Luck Next Time!";
    document.getElementById("r-sub").textContent   = passed
      ? "You passed the quiz successfully!"
      : "You didn't meet the passing score this time.";

    // Score
    document.getElementById("score-num").textContent    = score + "%";
    document.getElementById("r-quiz-title").textContent = data.quizTitle || "Quiz";
    document.getElementById("r-quiz-sub").textContent   = passed ? "✅ Quiz Passed!" : "❌ Quiz Not Passed";

    // Stats
    document.getElementById("s-score").textContent   = score + "%";
    document.getElementById("s-passing").textContent = passingScore + "%";
    document.getElementById("s-status").textContent  = passed ? "✅ PASSED" : "❌ FAILED";

    if (passed) {
      document.getElementById("cert-btn").style.display = "flex";
      launchConfetti();
    } else {
      const needed = passingScore - score;
      document.getElementById("score-needed").textContent = needed + "%";
      document.getElementById("fail-note").style.display = "block";
    }
  }

  async function handleDownload() {
    const btn = document.getElementById("cert-btn");
    btn.disabled = true;
    btn.textContent = "⏳ Generating Certificate...";
    try {
      await downloadCertificate(resultData.id);
      btn.textContent = "✅ Downloaded Successfully!";
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = "🏆 Download Certificate Again";
      }, 3000);
    } catch {
      btn.disabled = false;
      btn.innerHTML = "🏆 Download Certificate";
      alert("❌ Failed to generate certificate.");
    }
  }

  function retryQuiz() {
    const qid = resultData.quizId;
    sessionStorage.removeItem("quizResult");
    window.location.href = `quiz.html?quizId=${qid}`;
  }

  function launchConfetti() {
    const colors = ["#6366f1","#8b5cf6","#ec4899","#f59e0b","#10b981","#06b6d4"];
    const c      = document.getElementById("confetti");
    for (let i = 0; i < 100; i++) {
      const p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${Math.random()*2+2}s;
        animation-delay:${Math.random()*2}s;
        width:${Math.random()*10+5}px;
        height:${Math.random()*10+5}px;
        border-radius:${Math.random()>0.5?"50%":"3px"};
      `;
      c.appendChild(p);
    }
    setTimeout(() => c.innerHTML = "", 6000);
  }
</script>
</body>
</html>
